name: samba4-ad-webui

services:
  # -----------------------------------------------
  # Samba 4 - Active Directory Domain Controller
  # Full DC: DNS, Kerberos, LDAP, SMB, NetBIOS,
  # Global Catalog, RPC
  # -----------------------------------------------
  samba-ad:
    image: diegogslomp/samba-ad-dc:latest
    container_name: samba-ad
    hostname: dc1
    privileged: true
    environment:
      DOMAIN: ${SAMBA_DOMAIN}
      REALM: ${SAMBA_REALM}
      ADMIN_PASS: ${SAMBA_ADMIN_PASS}
      DNS_FORWARDER: ${DNS_FORWARDER:-8.8.8.8}
      BIND_NETWORK_INTERFACES: "false"
    volumes:
      - samba-data:/var/lib/samba
    ports:
      # DNS
      - "${BIND_IP:-127.0.0.1}:53:53/tcp"
      - "${BIND_IP:-127.0.0.1}:53:53/udp"
      # Kerberos
      - "${BIND_IP:-127.0.0.1}:88:88/tcp"
      - "${BIND_IP:-127.0.0.1}:88:88/udp"
      # RPC
      - "${BIND_IP:-127.0.0.1}:135:135/tcp"
      # NetBIOS Session
      - "${BIND_IP:-127.0.0.1}:139:139/tcp"
      # LDAP
      - "${BIND_IP:-127.0.0.1}:389:389/tcp"
      - "${BIND_IP:-127.0.0.1}:389:389/udp"
      # SMB
      - "${BIND_IP:-127.0.0.1}:445:445/tcp"
      # Kerberos Password Change
      - "${BIND_IP:-127.0.0.1}:464:464/tcp"
      - "${BIND_IP:-127.0.0.1}:464:464/udp"
      # LDAPS
      - "${BIND_IP:-127.0.0.1}:636:636/tcp"
      # Global Catalog
      - "${BIND_IP:-127.0.0.1}:3268:3268/tcp"
      # Global Catalog SSL
      - "${BIND_IP:-127.0.0.1}:3269:3269/tcp"
    networks:
      - samba-net
    dns:
      - 127.0.0.1
      - 8.8.8.8
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "samba-tool", "domain", "info", "127.0.0.1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # -----------------------------------------------
  # Web UI — Samba4 AD Administration
  # -----------------------------------------------
  app:
    container_name: samba4-ad-webui
    image: ghcr.io/patrickblattner/samba4-ad-webui:latest
    # Uncomment to build locally:
    # build:
    #   context: ..
    #   dockerfile: docker/Dockerfile
    env_file: ../.env
    environment:
      NODE_ENV: production
      PORT: 3000
      LDAP_URL: ldap://samba-ad:389
      LDAPS_URL: ldaps://samba-ad:636
      LDAP_TLS_REJECT_UNAUTHORIZED: "false"
    ports:
      - "${APP_PORT:-3000}:${APP_INTERNAL_PORT:-3000}"
    volumes:
      - certs:/app/certs
    depends_on:
      samba-ad:
        condition: service_healthy
    networks:
      - samba-net
    restart: unless-stopped

  # -----------------------------------------------
  # Seed — populates AD with test data (one-time)
  # Run with: docker compose --profile seed up ldap-seed
  # -----------------------------------------------
  ldap-seed:
    image: diegogslomp/samba-ad-dc:latest
    container_name: ldap-seed
    entrypoint: ["/bin/bash", "/seed/run-seed.sh"]
    volumes:
      - ./seed:/seed:ro
    environment:
      LDAP_HOST: "samba-ad"
      LDAP_ADMIN_PASSWORD: ${SAMBA_ADMIN_PASS}
      DOMAIN_DC: ${LDAP_BASE_DN}
      REALM_LOWER: ${SAMBA_REALM_LOWER}
    depends_on:
      samba-ad:
        condition: service_healthy
    networks:
      - samba-net
    restart: "no"
    profiles:
      - seed

volumes:
  samba-data:
  certs:

networks:
  samba-net:
